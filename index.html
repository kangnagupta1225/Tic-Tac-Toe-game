<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacToe Game</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <button id="modee">Change Theme</button>
    <div class="menu">
        <h2>Select Mode</h2>
        <button id="friendBtn">Play with Friend!</button>
        <button id="computerBtn">Play with Computer!</button>
    </div>
    <div class="msg-container hide">
        <p id="msg">Winner</p>
        <button id="new-btn">New game!</button>
    </div>
    <main>
    <div class="game hide">
        <div class="container">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
    </div>
    </div>
    <button id="reset-btn" class="hide">Reset game!</button>
    </main>
</body>
<script src="app.js"></script>
</html>
